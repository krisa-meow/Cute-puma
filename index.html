<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Date Range Picker</title>
</head>
<body>
    <div class="datepicker">
        <input type="text" placeholder="Select date" readonly>

        <div class="calendar" hidden>

            <div class="left-side">
                <div class="controls">
                    <button class="prev"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/></svg></button>
                    <strong class="label">Month YYYY</strong>
                </div>
                <div class="days">
                    <span>ПН</span>
                    <span>ВТ</span>
                    <span>СР</span>
                    <span>ЧТ</span>
                    <span>ПТ</span>
                    <span>СБ</span>
                    <span>ВС</span>
                </div>
                <div class="dates">
                </div>
            </div>

            <div class="center-side">
                <div class="controls">
                    <strong class="label">Month YYYY</strong>
                </div>
                <div class="days">
                    <span>ПН</span>
                    <span>ВТ</span>
                    <span>СР</span>
                    <span>ЧТ</span>
                    <span>ПТ</span>
                    <span>СБ</span>
                    <span>ВС</span>
                </div>
                <div class="dates">
                </div>
            </div>

            <div class="right-side">
                <div class="controls">
                    <button class="next"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg></button>
                    <strong class="label">Month YYYY</strong>
                </div>
                <div class="days">
                    <span>ПН</span>
                    <span>ВТ</span>
                    <span>СР</span>
                    <span>ЧТ</span>
                    <span>ПТ</span>
                    <span>СБ</span>
                    <span>ВС</span>
                </div>
                <div class="dates">
                </div>
            </div>

            <div class="action-menu">
                <span class="selection">DD/MM/YYYY - DD/MM/YYYY</span>

                <button class="cancel">Cancel</button>
                <button class="apply">Apply</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
